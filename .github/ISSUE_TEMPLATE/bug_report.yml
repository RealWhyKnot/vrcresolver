name: Bug report
description: WKVRCProxy is misbehaving — a URL doesn't resolve, doesn't play, the patcher can't reach VRChat, the UI is broken, etc.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. WKVRCProxy is alpha — most "video doesn't play" reports come down to one of:
        - a strategy returned a URL AVPro can't actually play (look for "Demoted" chips in the Logs view),
        - the hosts-file mapping `127.0.0.1 localhost.youtube.com` didn't take (declined UAC, AV blocked it),
        - the host needs a direct connection and isn't on the deny-list (`vr-m.net` etc.).

        The fields below collect the minimum we need to triage without back-and-forth. Read [Troubleshooting](https://github.com/RealWhyKnot/WKVRCProxy/wiki/Troubleshooting) first if you haven't.

  - type: checkboxes
    id: latest
    attributes:
      label: Pre-flight
      options:
        - label: I'm running the latest release (or a build pulled from `main` in the last few days).
          required: true
        - label: I've read the [Troubleshooting wiki page](https://github.com/RealWhyKnot/WKVRCProxy/wiki/Troubleshooting) and my issue isn't covered there.
          required: true
        - label: I understand this is alpha software.
          required: true

  - type: input
    id: version
    attributes:
      label: WKVRCProxy version
      description: From the **About** panel or `dist/version.txt`. Format `YYYY.M.D.N-HASH`.
      placeholder: "2026.4.27.7-4974"
    validations:
      required: true

  - type: input
    id: vrchat
    attributes:
      label: VRChat build
      description: Visible in VRChat's Settings → System.
      placeholder: "VRChat 2026.x.x"
    validations:
      required: false

  - type: input
    id: windows
    attributes:
      label: Windows version
      description: `Windows + R` → type `winver` → press Enter.
      placeholder: "Windows 11 26200"
    validations:
      required: false

  - type: dropdown
    id: install_loc
    attributes:
      label: WKVRCProxy install location
      description: The auto-updater needs write access. Installs under `Program Files` are known to break the updater.
      options:
        - "Anywhere except Program Files (recommended)"
        - "Inside Program Files (or another protected dir)"
        - "Not sure"
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: Failing URL (or domain)
      description: Redact the path if private — the host is what matters most. If it's not a URL bug, write `n/a`.
      placeholder: "https://example.com/watch?v=… or just `example.com`"
    validations:
      required: true

  - type: dropdown
    id: avpro_loading_failed
    attributes:
      label: Did the VRChat output log show `[AVProVideo] Error: Loading failed`?
      description: VRChat's output log is at `%LOCALAPPDATA%Low\VRChat\VRChat\output_log_*.txt`.
      options:
        - "Unsure / didn't check"
        - "Yes — exactly that message"
        - "No"
        - "Different AVPro error (paste it under 'Anything else')"
        - "n/a — not a playback bug"
    validations:
      required: true

  - type: dropdown
    id: relay_state
    attributes:
      label: Was the URL relay-wrapped or direct-connect?
      description: |
        In the **Logs** tab (filter to the failing request's correlation ID), look for:
        - `URL relay-wrapped on port …` → wrapped
        - `Relay wrap skipped for <host>` → direct
      options:
        - "Unknown / didn't see either log line"
        - "Relay-wrapped (`URL relay-wrapped on port …`)"
        - "Direct-connect (`Relay wrap skipped for …`)"
        - "n/a — not a playback bug"
    validations:
      required: true

  - type: dropdown
    id: hosts_file
    attributes:
      label: Hosts-file mapping present?
      description: |
        Open `C:\Windows\System32\drivers\etc\hosts` (read-only OK). Look for `127.0.0.1 localhost.youtube.com`.
      options:
        - "Unsure"
        - "Yes — entry is present"
        - "No — entry missing"
        - "n/a — not a playback bug"
    validations:
      required: true

  - type: checkboxes
    id: strategies
    attributes:
      label: Strategies seen in the Logs view (tick all that appeared for the failing request)
      description: |
        Helps us tell where in the cascade things broke. Tick the ones you saw in the correlation-ID block — leave unticked if not a playback bug.
      options:
        - label: "`tier0:streamlink` (Twitch / live-HLS)"
        - label: "`tier1:plain`"
        - label: "`tier1:pot` (PO-token via bgutil sidecar)"
        - label: "`tier1:impersonate` (curl-impersonate Chrome TLS)"
        - label: "`tier1:vrchat-ua`"
        - label: "`tier1:mweb`"
        - label: "`tier1:yt-combo`"
        - label: "`tier1:browser-extract` (headless browser)"
        - label: "`tier1:warp+default` / `tier1:warp+vrchat-ua`"
        - label: "`tier2:cloud-whyknot`"
        - label: "`tier3:yt-dlp-og` (VRChat's pinned yt-dlp)"
        - label: "`tier4:passthrough`"
        - label: "Strategy was demoted — `Strategy demoted` line appeared"

  - type: textarea
    id: logs
    attributes:
      label: Logs view output (correlation-ID block)
      description: |
        From the **Logs** tab in the UI, paste every line for the failing request. Each request has a correlation ID like `[a1b2c3d4]` — grab the whole block from `Starting resolution for: …` through to the failure or final resolution. Don't summarize; paste verbatim. If the bug isn't a resolution issue, paste any relevant log lines you can find (`wkvrcproxy_*.log` next to the exe is the same content).
      render: text
      placeholder: |
        [a1b2c3d4] Starting resolution for: https://…
        [a1b2c3d4] [tier1:plain] yt-dlp ok in 320ms
        [a1b2c3d4] URL relay-wrapped on port 23119
        [a1b2c3d4] [WARNING] [Playback] AVPro rejected resolved URL from 'tier1:plain'
        …
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: What did you do, in order? Include in-world player type if you know it (Stream / Video / Movie & Chill / etc.). For non-playback bugs, describe what you clicked / configured.
      placeholder: |
        1. Launched WKVRCProxy, then VRChat.
        2. Joined world "Movie & Chill".
        3. Pasted the URL above into the player.
        4. Player showed "Loading…" indefinitely.
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: |
        Brief list of workarounds attempted. "Nothing yet" is fine.
      placeholder: |
        - Restarted WKVRCProxy and VRChat
        - Toggled Pre-Flight URL Probe in Settings
        - Cleared `strategy_memory.json`
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Settings tweaks, screenshots, snippets of `app_config.json`, suspected cause, etc.
    validations:
      required: false
