name: Feature request
description: Suggest a new capability, strategy, host support, or UX improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that WKVRCProxy doesn't currently support? Describe the situation, not a solution.
      placeholder: "When I paste a URL from <host>, …"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other approaches you considered. "None" is a valid answer.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this (bonus, not required).
          required: false
