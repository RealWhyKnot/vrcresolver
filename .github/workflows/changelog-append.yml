name: Changelog append

# On every push to main, walk the commits in the push range and append bullets
# under "## Unreleased" in CHANGELOG.md (root, embedded into the in-app viewer)
# and wiki/Changelog.md (mirrored to the GitHub Wiki). Then commit the
# updated files back to main and trigger wiki-sync so the Wiki reflects the
# new state without waiting for the next manual push.
#
# A push made by GITHUB_TOKEN does NOT trigger workflow runs, so the appender's
# own commit-and-push won't recurse. The wiki-sync workflow is fired explicitly
# at the end of this job for the same reason — its push trigger wouldn't fire
# off a token-pushed commit.

on:
  push:
    branches: [main]
    # Skip pushes that only touch the changelog files themselves or pure-doc
    # paths the user has already taken care of. Saves a workflow run on
    # release.yml's promotion commit (it modifies CHANGELOG.md exclusively).
    paths-ignore:
      - 'CHANGELOG.md'
      - 'wiki/Changelog.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'

permissions:
  contents: write   # push the appender's commit back to main
  actions: write    # gh workflow run wiki-sync.yml

concurrency:
  # Serialise: two concurrent appenders racing to push could lose entries.
  group: changelog-append
  cancel-in-progress: false

jobs:
  append:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip changelog]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so the before..after range resolves
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute push range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          before='${{ github.event.before }}'
          after='${{ github.event.after }}'

          # First push to a branch arrives with before=000... — fall back to
          # the parent of the current commit so we still process the head.
          if [[ "$before" =~ ^0+$ ]]; then
            echo "First-push detection (before is zeros) — using HEAD~1..HEAD."
            range="HEAD~1..HEAD"
          else
            # Force-push edge case: if before isn't an ancestor, the simple
            # before..after range can include unrelated commits. Detect and
            # fall back to single-commit mode.
            if git merge-base --is-ancestor "$before" "$after" 2>/dev/null; then
              range="$before..$after"
            else
              echo "before $before is not an ancestor of $after (force-push?) — using HEAD~1..HEAD."
              range="HEAD~1..HEAD"
            fi
          fi
          echo "range=$range" >> "$GITHUB_OUTPUT"
          echo "Computed range: $range"

      - name: Append commits to CHANGELOG
        id: append
        shell: pwsh
        run: |
          ./.github/scripts/Update-Changelog.ps1 -Mode Append -Range '${{ steps.range.outputs.range }}'

          # Mark whether anything actually changed so the next steps can skip.
          $changed = & git status --porcelain CHANGELOG.md wiki/Changelog.md
          if ([string]::IsNullOrWhiteSpace($changed)) {
            "changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "No changelog updates produced."
          } else {
            "changed=true"  >> $env:GITHUB_OUTPUT
            Write-Host "Changelog updates ready to commit."
            & git --no-pager diff --stat CHANGELOG.md wiki/Changelog.md
          }

      - name: Commit and push
        if: steps.append.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md wiki/Changelog.md
          git commit -m "docs(changelog): auto-append entries from ${GITHUB_SHA::7} [skip changelog]

          Maintained by .github/workflows/changelog-append.yml.
          See .github/scripts/Update-Changelog.ps1 for the parsing rules."
          # Push to the same branch this workflow ran on (always main given the
          # trigger filter, but read it from context anyway).
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Trigger wiki sync
        # wiki/Changelog.md changed under github-actions[bot] auth, which
        # doesn't fire push triggers — kick wiki-sync explicitly so the Wiki
        # mirrors the new entry without waiting for an unrelated push.
        if: steps.append.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run wiki-sync.yml --ref main || \
            echo "::warning::Failed to trigger wiki-sync; the next wiki/** push will pick it up."
