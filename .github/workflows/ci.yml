name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: dotnet build + test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Target the test project explicitly. The repo's WKVRCProxy.slnx
      # intentionally excludes HlsTests (and the harness), so restoring
      # the solution leaves the tests un-restored. Restoring the test
      # project pulls Core in via ProjectReference.
      - name: Restore
        run: dotnet restore src/WKVRCProxy.HlsTests

      - name: Build tests
        run: dotnet build src/WKVRCProxy.HlsTests --configuration Release --no-restore

      - name: Test
        run: dotnet test src/WKVRCProxy.HlsTests --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./test-results
          if-no-files-found: ignore
