name: CI

on:
  push:
    branches: [main]
    # Negations re-include CHANGELOG.md / wiki/Changelog.md so the auto-merged
    # release-promotion PR clears its required status check (release.yml opens
    # it after every tag push).
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - '!CHANGELOG.md'
      - '!wiki/Changelog.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - '!CHANGELOG.md'
      - '!wiki/Changelog.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: dotnet build + test
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore WKVRCProxy.slnx

      - name: Build
        run: dotnet build WKVRCProxy.slnx --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test src/WKVRCProxy.Tests/WKVRCProxy.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./test-results
          if-no-files-found: ignore
